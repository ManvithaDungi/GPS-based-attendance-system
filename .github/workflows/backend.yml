name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'

env:
  NODE_VERSION: '20'
  WORKING_DIR: apps/backend

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────
  # Job 2: Test (requires PostgreSQL service)
  # ─────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gps_attendance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gps_attendance_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gps_attendance_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      REFRESH_SECRET: ci-test-refresh-secret
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run test suite
        run: npm test -- --runInBand --forceExit

  # ─────────────────────────────────────────────────
  # Job 3: Build (production artifact)
  # ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            ${{ env.WORKING_DIR }}/dist/
            ${{ env.WORKING_DIR }}/prisma/
            ${{ env.WORKING_DIR }}/package.json
            ${{ env.WORKING_DIR }}/package-lock.json
          retention-days: 7

  # ─────────────────────────────────────────────────
  # Job 4: Deploy to Render (only on main branch push)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Trigger Render deploy
        run: |
          echo " Triggering deploy to Render..."
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "⚠️ Deploy hook not configured yet — set RENDER_DEPLOY_HOOK secret"

      - name: Deploy summary
        run: |
          echo " CI passed — deploy triggered"
          echo "   Platform: Render (Node runtime)"
          echo "   Database: Neon (PostgreSQL)"
          echo "   Render will run: npm ci → prisma generate → tsc → prisma migrate deploy → node dist/server.js"
